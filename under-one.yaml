# ═══════════════════════════════════════════════════════════
# 符箓生成器配置 (tongtian-lu)
# ═══════════════════════════════════════════════════════════
tongtianlu:
  dimension_keywords:
    analysis: ["分析", "提取", "解析", "拆解", "关键词", "情感"]
    creation: ["写", "生成", "创建", "改写", "润色", "翻译"]
    verification: ["检查", "验证", "确认", "校对", "测试", "审查"]
    transformation: ["转换", "格式化", "重组", "变成", "转义"]
    retrieval: ["搜索", "查找", "查询", "检索", "获取"]
    decision: ["对比", "评估", "选择", "排序", "优先级"]

  constraint_keywords:
    high_risk: ["删除", "覆盖", "资金", "医疗", "法律", "生产环境"]
    medium_risk: ["发布", "发送", "配置", "权限", "变更"]

  sla_budget:
    warning: 90
    critical: 120

  order_map:
    检索箓: 1
    分析箓: 2
    决策箓: 3
    创作箓: 4
    验证箓: 5
    转换箓: 6

  orchestration_modes:
    modes:
      quick-cast:
        max_talismans: 2
        include_verification_tail: false
        prefer_parallel: true
        topology_strategy: "minimal-chain"
        intent: "rapid decomposition"
      balanced-array:
        max_talismans: 4
        include_verification_tail: false
        prefer_parallel: true
        topology_strategy: "balanced-lattice"
        intent: "balanced orchestration"
      full-ritual:
        max_talismans: 6
        include_verification_tail: true
        prefer_parallel: false
        topology_strategy: "full-stack ritual"
        intent: "full-stack execution lattice"

# ═══════════════════════════════════════════════════════════
# 修身炉配置 (xiushen-lu)
# ═══════════════════════════════════════════════════════════
xiushenlu:
  min_history_records: 10
  backup_retention: 7
  auto_rollback_on_syntax_error: true
  persist_adaptive_thresholds_on_apply_only: true
  adaptive_threshold_bounds:
    success_rate_warning: [0.72, 0.90]
    success_rate_critical: [0.60, 0.80]
    human_intervention_warning: [0.05, 0.20]
    degradation_consecutive: [3, 6]
  evolution_types:
    - tuning
    - extension
    - refactor

# ═══════════════════════════════════════════════════════════
# 检查点配置（全局）
# ═══════════════════════════════════════════════════════════
checkpoints:
  auto_confirm: false
  mutex_arbitration: true
  ecosystem_downgrade_alert: true
  synergy_activation: true

# ═══════════════════════════════════════════════════════════
# 路径映射
# ═══════════════════════════════════════════════════════════
paths:
  runtime_data: "runtime_data"
  skill_backups: "skill_backups_v7"
  reports: "."
