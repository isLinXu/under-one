# under-one.skills 全局配置文件
# 放置位置: 项目根目录 /under-one.yaml
# 所有 skill 脚本通过 _skill_config.py 自动读取此文件

# ═══════════════════════════════════════════════════════════
# 全局阈值配置
# ═══════════════════════════════════════════════════════════
thresholds:
  entropy_warning: 0.6
  entropy_critical: 0.3
  alignment_warning: 0.5
  alignment_critical: 0.3
  success_rate_warning: 0.80
  success_rate_critical: 0.65
  human_intervention_warning: 0.10
  human_intervention_critical: 0.25
  degradation_consecutive: 4
  sla_threshold: 1.15
  quality_drop_threshold: 5.0
  short_text_limit: 50
  max_task_desc_length: 2000

# ═══════════════════════════════════════════════════════════
# 生态协调器配置 (bagua-zhen)
# ═══════════════════════════════════════════════════════════
baguazhen:
  mutex_pairs:
    - ["tongtian-lu", "shenji-bailian"]
    - ["qiti-yuanliu", "fenghou-qimen"]
    - ["dalu-dongguan", "liuku-xianzei"]
  synergy_pairs:
    - ["tongtian-lu", "dalu-dongguan"]
    - ["juling-qianjiang", "shenji-bailian"]
    - ["qiti-yuanliu", "shuangquanshou"]
  min_cooccurrence_for_dynamic: 3
  cache_ttl_seconds: 3600
  prefer_dynamic_overrides: true
  dynamic_ignore_pairs:
    - ["bagua-zhen", "xiushen-lu"]

# ═══════════════════════════════════════════════════════════
# 优先级引擎配置 (fenghou-qimen)
# ═══════════════════════════════════════════════════════════
fenghouqimen:
  # 蒙特卡洛参数
  monte_carlo_simulations: 100
  time_variance: 0.2
  default_estimated_time: 30
  on_time_multiplier: 1.2
  
  # 鲁棒性评估阈值
  robustness_high: 80
  robustness_medium: 60
  
  # 缓冲建议阈值
  buffer_threshold: 80
  buffer_recommendation_low: "增加20%应急资源"
  buffer_recommendation_high: "无需额外缓冲"
  
  # 八门阈值映射
  gates:
    开门: [4.5, 999]
    生门: [4.0, 4.5]
    景门: [3.2, 4.0]
    杜门: [2.5, 3.2]
    死门: [0.0, 2.5]
  
  # 九维度权重配置（支持动态模板）
  weights:
    urgency: 0.25
    importance: 0.35
    dependency: 0.15
    resource_match: 0.10
    time_pressure: 0.10
    environment_readiness: 0.05
    team_match: 0.05
  
  # 动态权重模板
  weight_templates:
    balanced:
      urgency: 0.25
      importance: 0.35
      dependency: 0.15
      resource_match: 0.10
      time_pressure: 0.10
      environment_readiness: 0.05
      team_match: 0.05
    urgency_priority:
      urgency: 0.40
      importance: 0.25
      dependency: 0.10
      resource_match: 0.10
      time_pressure: 0.10
      environment_readiness: 0.03
      team_match: 0.02
    quality_priority:
      urgency: 0.15
      importance: 0.45
      dependency: 0.15
      resource_match: 0.05
      time_pressure: 0.05
      environment_readiness: 0.10
      team_match: 0.05
    resource_limited:
      urgency: 0.20
      importance: 0.30
      dependency: 0.20
      resource_match: 0.15
      time_pressure: 0.05
      environment_readiness: 0.05
      team_match: 0.05
    team_driven:
      urgency: 0.15
      importance: 0.25
      dependency: 0.10
      resource_match: 0.10
      time_pressure: 0.10
      environment_readiness: 0.05
      team_match: 0.25

# ═══════════════════════════════════════════════════════════
# 多工具调度器配置 (juling-qianjiang)
# ═══════════════════════════════════════════════════════════
julingqianjiang:
  # 匹配评分权重
  match_weights:
    capability: 0.40
    health: 0.25
    load_balance: 0.20
    quality: 0.15
  
  # 负载均衡策略: round_robin | least_used | best_score
  load_balance_strategy: "best_score"
  
  # 健康度阈值
  health_warning: 0.60
  health_critical: 0.30
  fallback_quality_floor: 0.55
  fallback_history_weight: 0.35
  fallback_exact_match_bonus: 0.05
  formation: "dual-attunement"
  formations:
    single-possession:
      max_support_spirits: 0
      role_label: "sole"
    dual-attunement:
      max_support_spirits: 1
      role_label: "primary"
    night-parade:
      max_support_spirits: 3
      role_label: "marshal"
  
  # 能力别名映射（支持扩展匹配）
  capability_aliases:
    search:
      - "web_search"
      - "local_search"
      - "semantic_search"
    browse:
      - "fetch"
      - "crawl"
      - "scrape"
    code:
      - "execute"
      - "compile"
      - "lint"
    data:
      - "query"
      - "analyze"
      - "transform"
    write:
      - "generate"
      - "draft"
      - "edit"
  
  # 降级策略矩阵（protect模式）
  fallback_protect:
    search:
      method: "cached_search"
      quality: 0.70
    browse:
      method: "mock_fetch"
      quality: 0.50
    code:
      method: "local_fallback"
      quality: 0.60
    data:
      method: "stale_data"
      quality: 0.40
    write:
      method: "template_output"
      quality: 0.55
    default:
      method: "skip"
      quality: 0.0
  
  # 降级策略矩阵（possess模式）
  fallback_possess:
    search:
      method: "local_knowledge_search"
      quality: 0.85
    browse:
      method: "cached_fetch"
      quality: 0.80
    code:
      method: "local_execution"
      quality: 0.90
    data:
      method: "mock_response"
      quality: 0.75
    write:
      method: "llm_generation"
      quality: 0.80
    default:
      method: "mock_general"
      quality: 0.60

# ═══════════════════════════════════════════════════════════
# 上下文稳态扫描器配置 (qiti-yuanliu)
# ═══════════════════════════════════════════════════════════
qitiyuanliu:
  # 上下文窗口大小
  context_window: 5

  # ── 语义熵计算权重 ──
  entropy_weights:
    conflict: 2.0
    gap: 1.5
    redundancy: 0.5
    topic_drift: 1.8
    intent_shift: 1.2

  # 熵阈值
  entropy_thresholds:
    warning: 3.0
    critical: 7.0

  # ── 矛盾检测 ──
  contradiction:
    # 直接矛盾关键词
    keywords:
      - "不对"
      - "错了"
      - "矛盾"
      - "之前说"
      - "改回"
      - "重新"
      - "不是这个"
      - "相反"
      - "不一致"
    # 否定前缀（用于语义矛盾检测）
    negation_prefixes:
      - "不"
      - "没"
      - "无"
      - "非"
      - "勿"
      - "别"
      - "未"
      - "否"
    # 语义反转模式：前缀+肯定词 → 否定语义
    reversal_patterns:
      - ["是", "不是"]
      - ["要", "不要"]
      - ["能", "不能"]
      - ["会", "不会"]
      - ["对", "不对"]
      - ["好", "不好"]
      - ["行", "不行"]
      - ["可以", "不可以"]
    # 用户澄清/口径修正标记
    clarification_markers:
      - "我说的是"
      - "我的意思是"
      - "准确来说"
      - "更准确地说"
      - "这里指的是"
      - "补充一下"
      - "更正一下"
      - "具体来说"
    # 强制重置/推翻标记
    hard_reset_markers:
      - "改回"
      - "重新理解"
      - "不是这个方案"
      - "完全不是"
      - "之前的目标也不准确"
      - "推翻"
      - "重做"
      - "换成"

  repair_handoff:
    contradiction_threshold: 2
    target_skill: "dalu-dongguan"
    action: "cross_segment_trace"
    reason: "repeated_contradictions"
    evidence_limit: 3

  # ── 意图漂移检测 ──
  intent_shift:
    # 转折词密度阈值（每百字）
    shift_density_threshold: 2.0
    # 转折关键词
    transition_words:
      - "但是"
      - "然而"
      - "不过"
      - "却"
      - "反而"
      - "其实"
      - "实际上"
      - "话说回来"
    # 否定密度阈值
    negation_density_threshold: 3.0

  # ── 信息密度（语义级） ──
  semantic_density:
    # 实词类别（中文）
    content_pos:
      - "名词"
      - "动词"
      - "形容词"
      - "数词"
      - "量词"
    # 虚词类别
    function_pos:
      - "助词"
      - "介词"
      - "连词"
      - "语气词"
    # 密度等级阈值（实词比例）
    high_threshold: 0.55
    medium_threshold: 0.35

  # ── 推理链完整度 ──
  completeness:
    logic_markers:
      - "因为"
      - "所以"
      - "首先"
      - "然后"
      - "最后"
      - "结论"
      - "因此"
      - "总之"
      - "综上所述"
    base_score: 50
    per_marker: 5
    max_score: 100

  # ── 健康分权重 ──
  health_weights:
    consistency: 0.25
    alignment: 0.25
    completeness: 0.20
    entropy_bonus: 0.30

  # 健康等级阈值
  health_thresholds:
    excellent: 90
    good: 75
    warning: 60

  # ── 目标对齐度 ──
  alignment:
    # 首轮参考长度
    first_goal_length: 150
    # 后续消息最小长度
    min_msg_length: 30
    # 关键词重叠度低阈值
    low_overlap_threshold: 0.2
    # 每轮漂移扣分
    drift_penalty: 8

  # ── DNA快照 ──
  dna_snapshot:
    rounds: 3
    preview_length: 30

# ═══════════════════════════════════════════════════════════
# 工具工厂配置 (shenji-bailian)
# ═══════════════════════════════════════════════════════════
shenjibailian:
  # 模板定义（支持外部扩展）
  templates:
    json_processor:
      keywords: ["json", "清洗", "过滤", "转换", "合并", "去重", "clean", "filter", "transform", "merge", "dedup"]
      transform_code: |
        def transform(data):
            """JSON数据处理 - 去重、过滤空值、格式化"""
            if isinstance(data, list):
                seen = set()
                result = []
                for item in data:
                    key = json.dumps(item, sort_keys=True, ensure_ascii=False) if isinstance(item, dict) else str(item)
                    if key not in seen and item:
                        seen.add(key)
                        result.append(item)
                return {"status": "ok", "count": len(result), "data": result}
            elif isinstance(data, dict):
                cleaned = {k: v for k, v in data.items() if v is not None and v != ""}
                return {"status": "ok", "count": len(cleaned), "data": cleaned}
            return {"status": "ok", "data": data}
      test_cases: |
        def test_transform():
            from {module_name} import transform
            result = transform([{"a": 1}, {"a": 1}, {"b": 2}])
            assert result["count"] == 2
            result = transform({"a": 1, "b": None, "c": ""})
            assert "b" not in result["data"]
            print("transform测试通过")
      sample_input: '[{"id": 1, "name": "Alice"}, {"id": 2, "name": "Bob"}]'

    csv_processor:
      keywords: ["csv", "表格", "字段", "映射", "统计", "转换", "table", "column", "field"]
      transform_code: |
        def transform(data):
            """CSV数据处理 - 解析、字段映射、基础统计"""
            lines = data.strip().split("\n") if isinstance(data, str) else []
            if not lines:
                return {"status": "ok", "count": 0, "data": []}
            headers = lines[0].split(",")
            rows = []
            for line in lines[1:]:
                values = line.split(",")
                row = {h.strip(): v.strip() for h, v in zip(headers, values)}
                rows.append(row)
            return {"status": "ok", "count": len(rows), "headers": headers, "data": rows}
      test_cases: |
        def test_transform():
            from {module_name} import transform
            csv_text = "name,age\nAlice,30\nBob,25"
            result = transform(csv_text)
            assert result["count"] == 2
            assert result["data"][0]["name"] == "Alice"
            print("transform测试通过")
      sample_input: '"name,age\nAlice,30\nBob,25"'

    text_extractor:
      keywords: ["文本", "提取", "正则", "匹配", "关键词", "解析", "text", "extract", "regex", "keyword", "parse"]
      transform_code: |
        def transform(data):
            """文本提取 - 正则匹配、关键词统计、格式化输出"""
            text = data if isinstance(data, str) else json.dumps(data, ensure_ascii=False)
            urls = re.findall(r'https?://[^\s"<>]+', text)
            emails = re.findall(r'[\w.-]+@[\w.-]+\.\w+', text)
            phrases = re.findall(r'[\u4e00-\u9fff]{2,10}', text)
            word_freq = {}
            for w in phrases:
                word_freq[w] = word_freq.get(w, 0) + 1
            top_words = sorted(word_freq.items(), key=lambda x: x[1], reverse=True)[:10]
            return {"status": "ok", "urls": urls, "emails": emails, "top_words": top_words, "char_count": len(text), "word_count": len(phrases)}
      test_cases: |
        def test_transform():
            from {module_name} import transform
            text = "联系邮箱: test@example.com 官网: https://example.com 关键词: 数据分析 数据挖掘"
            result = transform(text)
            assert "test@example.com" in result["emails"]
            assert "https://example.com" in result["urls"]
            print("transform测试通过")
      sample_input: '"联系邮箱: test@example.com 官网: https://example.com"'

    file_organizer:
      keywords: ["文件", "整理", "重命名", "分类", "批量", "移动", "file", "organize", "rename", "batch"]
      transform_code: |
        def transform(data):
            """文件整理 - 根据规则批量处理文件"""
            import os, re
            rules = data if isinstance(data, dict) else {}
            source_dir = rules.get("source_dir", ".")
            pattern = rules.get("pattern", r".*")
            action = rules.get("action", "list")
            results = []
            if not os.path.isdir(source_dir):
                return {"status": "error", "message": f"目录不存在: {source_dir}"}
            for fname in sorted(os.listdir(source_dir)):
                if re.match(pattern, fname):
                    fpath = os.path.join(source_dir, fname)
                    if action == "list":
                        results.append({"name": fname, "size": os.path.getsize(fpath)})
                    elif action == "rename" and "new_name" in rules:
                        new_name = rules["new_name"].format(name=fname)
                        os.rename(fpath, os.path.join(source_dir, new_name))
                        results.append({"old": fname, "new": new_name})
            return {"status": "ok", "count": len(results), "files": results}
      test_cases: |
        def test_transform():
            from {module_name} import transform
            result = transform({"source_dir": ".", "pattern": ".*", "action": "list"})
            assert "files" in result
            print("transform测试通过")
      sample_input: '{"source_dir": ".", "pattern": ".*", "action": "list"}'

    data_analyzer:
      keywords: ["分析", "统计", "聚合", "报告", "计算", "汇总", "analyze", "stats", "aggregate", "report", "summary"]
      transform_code: |
        def transform(data):
            """数据分析 - 统计、聚合、报告生成"""
            if isinstance(data, list) and data:
                numeric_cols = {}
                for item in data:
                    if isinstance(item, dict):
                        for k, v in item.items():
                            if isinstance(v, (int, float)):
                                if k not in numeric_cols:
                                    numeric_cols[k] = []
                                numeric_cols[k].append(v)
                stats = {}
                for col, values in numeric_cols.items():
                    stats[col] = {"count": len(values), "sum": round(sum(values), 2), "avg": round(sum(values) / len(values), 2), "min": min(values), "max": max(values)}
                return {"status": "ok", "record_count": len(data), "statistics": stats}
            elif isinstance(data, dict):
                return {"status": "ok", "field_count": len(data), "keys": list(data.keys())}
            return {"status": "ok", "data_type": type(data).__name__, "length": len(data) if hasattr(data, '__len__') else 0}
      test_cases: |
        def test_transform():
            from {module_name} import transform
            data = [{"a": 10, "b": 20}, {"a": 15, "b": 25}, {"a": 20, "b": 30}]
            result = transform(data)
            assert result["statistics"]["a"]["avg"] == 15.0
            print("transform测试通过")
      sample_input: '[{"a": 10, "b": 20}, {"a": 15, "b": 25}]'

  # 通用模板（回退）
  generic:
    transform_code: |
      def transform(data):
          """通用数据处理 - 根据需求定制"""
          if isinstance(data, list):
              return {"status": "ok", "count": len(data), "data": data}
          elif isinstance(data, dict):
              return {"status": "ok", "count": len(data), "keys": list(data.keys()), "data": data}
          return {"status": "ok", "data": data}
    test_cases: |
      def test_transform():
          from {module_name} import transform
          result = transform({"key": "value"})
          assert result["status"] == "ok"
          print("transform测试通过")
    sample_input: '{"key": "value"}'

  # 契约文档增强配置
  contract:
    sections:
      - "输入契约"
      - "输出契约"
      - "性能契约"
      - "异常契约"
      - "边界条件"
      - "使用示例"
      - "测试方法"
    performance_baseline:
      time_complexity: "O(n)"
      space_complexity: "O(n)"
      max_input_size: "100MB"
    input_validation:
      required_fields: ["status", "data"]
      optional_fields: ["count", "message"]

  # 测试生成配置
  test_generation:
    categories:
      - name: "normal"
        description: "正常输入测试"
      - name: "empty"
        description: "空/边界输入测试"
      - name: "boundary"
        description: "边界条件测试"
      - name: "exception"
        description: "异常输入测试"
      - name: "config"
        description: "配置加载测试"

  # 代码质量配置
  code_quality:
    add_type_hints: true
    add_docstrings: true
    add_config_loader: true
    min_function_length: 5

  # 锻造模式
  forge_modes:
    modes:
      scaffold-only:
        include_tests: false
        include_contract: false
        intent: "rapid scaffolding"
      contract-first:
        include_tests: true
        include_contract: true
        intent: "contract-led forging"
      battle-ready:
        include_tests: true
        include_contract: true
        intent: "deployable forging"

  natural_language_inference:
    specialization_map:
      tool:
        cli-tool: ["cli", "命令行", "脚本工具"]
        data-tool: ["数据", "分析", "统计", "清洗", "csv", "json"]
      skill:
        browser-skill: ["网页", "浏览器", "链接", "抓取", "站点"]
        analysis-skill: ["分析", "总结", "摘要", "报告", "研究"]
        workflow-skill: ["工作流", "自动化", "编排", "流程", "任务链"]
    io_patterns:
      inputs:
        input.json: ["json", "输入json", "json输入"]
        input.csv: ["csv", "表格", "逗号分隔"]
        input.txt: ["文本", "txt", "纯文本"]
        webpage_url: ["网页", "url", "链接", "网页内容"]
      outputs:
        report.json: ["报告", "report"]
        summary.md: ["总结", "摘要", "markdown"]
        validation_result.json: ["校验结果", "验证结果", "校验", "验证"]
        cleaned.json: ["清洗结果", "清洗", "去重"]
    trigger_keywords:
      common: ["生成", "处理", "自动化"]
      tool: ["CLI", "脚本", "工具"]
      skill: ["skill", "技能", "工作流"]
    tag_map:
      validation: ["校验", "验证"]
      retrieval: ["检索", "搜索", "网页"]
      summarization: ["总结", "摘要"]
      cleaning: ["清洗", "去重", "过滤"]
      analysis: ["分析", "统计", "汇总"]
    specialization_template_map:
      data-tool: data_analyzer
      browser-skill: text_extractor
      analysis-skill: data_analyzer

