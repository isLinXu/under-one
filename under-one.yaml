    欺骗: ["欺骗", "欺诈", "诈骗", "哄骗", "蒙蔽"]
    编造: ["编造", "捏造", "虚构", "杜撰", "伪造"]
  negation_prefixes:
    - "不"
    - "不要"
    - "禁止"
    - "避免"
    - "别"
    - "不能"
    - "不可以"
    - "勿"
    - "拒绝"
    - "反对"
    - "防止"

  # 风格维度
  style_dimensions:
    - "tone"
    - "formality"
    - "detail_level"
    - "structure"

  # 漂移阈值
  drift_thresholds:
    green: 0.2
    yellow: 0.4
    red: 0.5

  # 人格分裂检测
  split_detection:
    rounds: 3
    unique_styles: 3

# ═══════════════════════════════════════════════════════════
# 知识消化器配置 (liuku-xianzei)
# ═══════════════════════════════════════════════════════════
liukuxianzei:
  # 三要素权重（总和应为1.0）
  element_weights:
    core_claim: 0.40
    evidence: 0.30
    application: 0.30

  # 消化率等级阈值
  digestion_thresholds:
    high: 80
    medium: 50

  # 内容质量评分梯度（最大匹配关键词数对应满分）
  scoring_gradient:
    core_claim_max: 5
    evidence_max: 4
    application_max: 4

  # 信息密度因子：字数过少时给予补偿，过多时给予奖励
  density_factor:
    short_text_limit: 50
    short_bonus: 1.05
    optimal_min: 80
    optimal_max: 500
    optimal_bonus: 1.10
    long_penalty_threshold: 1000
    long_penalty: 0.95

  # 关键词配置（支持外部扩展）
  keywords:
    core_claim:
      - "是"
      - "为"
      - "指"
      - "提出"
      - "表明"
      - "证明"
      - "发现"
      - "结论"
      - "显示"
      - "研究"
      - "通过"
      - "实现"
      - "解决"
      - "提升"
      - "降低"
      - "改进"
      - "验证"
      - "基于"
      - "核心"
      - "本质"
    evidence:
      - "数据"
      - "统计"
      - "研究表明"
      - "因为"
      - "实验"
      - "测试"
      - "结果"
      - "证据"
      - "报告"
      - "分析"
      - "量化"
      - "对比"
    application:
      - "用于"
      - "应用"
      - "场景"
      - "案例"
      - "实践"
      - "部署"
      - "实施"
      - "落地"
      - "适用于"
      - "在...中"
    short_text:
      - "推荐"
      - "版本"
      - "使用"
      - "支持"
      - "需要"
      - "建议"
      - "依赖"
      - "兼容"
      - "要求"
      - "配置"

  # 反刍调度规则（按消化率区间配置）
  review_schedule:
    - level: "低"
      min_rate: 0
      max_rate: 50
      time: "4小时"
      reason: "低消化率，需尽快复习"
    - level: "中"
      min_rate: 50
      max_rate: 80
      time: "1天"
      reason: "待补充理解"
    - level: "高"
      min_rate: 80
      max_rate: 100
      time: "7天"
      reason: "巩固记忆"

  # 可信度权重
  credibility_weights:
    S: 1.5
    A: 1.2
    B: 1.0
    C: 0.6

  # 保鲜期规则（天）
  freshness_days:
    技术方案: 90
    行业数据: 180
    基础理论: 1095
    法律法规: 7
    社区经验: 90
    默认: 180

